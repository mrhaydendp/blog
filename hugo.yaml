baseURL: "https://blog.mrhaydendp.com/"
title: "Hayden's Blog"
theme: PaperMod
pagination:
  pagerSize: 5

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false
enableGitInfo: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Hayden's Blog"
  description: "Practical guides for Linux, Android, open source software, and system optimization for your personal projects and homelab setups."
  keywords: [Blog, Linux, Portfolio]
  author: ["Hayden Plumley"]
  images: ["apple-touch-icon.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: false
  ShowShareButtons: false
  ShowPostNavLinks: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: false
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "favicon.ico"
    faviconsvg: "favicon.svg"
    favicon96x96: "favicon-96x96.png"
    apple_touch_icon: "apple-touch-icon.png"
    safari_pinned_tab: "favicon.svg"

  label:
    text: "Hayden's Blog"
    icon: "favicon.svg"
    iconHeight: 30

  # home-info mode
  homeInfoParams:
    Title: '$ echo "Hello World!"'
    Content: "A blog made for people interested in Linux, Android, open source, and whatever software I'm hyper-fixating on this month."

  socialIcons:
    - name: github
      url: "https://github.com/mrhaydendp"
    - name: x
      url: "https://x.com/mrhaydendp"
    - name: rss
      url: /posts/index.xml
    - name: email
      url: "mailto:mrhaydendp@gmail.com"
      

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: false # hide on single page

  editPost:
    URL: "https://github.com/mrhaydendp/blog/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://www.fusejs.io/fuzzy-search.html
  # https://www.fusejs.io/token-search.html
  fuseOpts:
    useTokenSearch: true
    isCaseSensitive: false
    threshold: 0.3
    distance: 100
    limit: 5
    location: 0
    shouldSort: false
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: projects
      name: Projects
      url: "https://github.com/mrhaydendp?tab=repositories"
      weight: 10
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 20
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 30
    - identifier: about
      name: About
      url: /About
      weight: 40
    - identifier: search
      name: Search
      url: /search/
      weight: 50

# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    anchorLineNos: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    noClasses: false
    style: monokai

# Necessary for search
outputs:
  home:
    - HTML
    - RSS
    - JSON
